<!DOCTYPE html>
<html lang="pt-br">
<head>
    <head>
    <meta charset="UTF-8">
    <title>D.H.L - Sistema de Detetives</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    

    
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        @font-face { font-family: 'Aloja'; src: url('Aloja.ttf'); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(to right, #f2a6f9, #fff7c0);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Aloja', sans-serif; overflow: hidden;
        }

        /* --- TELAS --- */
        #screen-1 { display: flex; flex-direction: column; align-items: center; text-align: center; }
        #screen-2 { display: none; width: 100vw; height: 100vh; flex-direction: row; }

        /* TELA 1 */
        .logo-text { font-size: 100px; color: #9b6ccf; }
        .wave-separator {
            width: 180px; height: 45px; background-color: #ff33cc; margin: 10px auto 40px auto;
            clip-path: polygon(0% 20%, 25% 0%, 50% 20%, 75% 0%, 100% 20%, 100% 80%, 75% 100%, 50% 80%, 25% 100%, 0% 80%);
        }
        .system-label { font-size: 28px; color: #b388eb; }
        .system-label b { color: #ff007f; }
        .detectives-names { font-size: 55px; color: #ff75c3; margin: 20px 0; }
        .location-info { font-size: 32px; color: #6347d1; margin-bottom: 40px; }
        
        #btn-avancar {
            background-color: #9b6ccf; color: #26c4f5; font-size: 40px; padding: 10px 80px;
            border: none; border-radius: 30px; cursor: pointer; transition: 0.3s;
        }
        #btn-avancar:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* TELA 2 (SISTEMA) */
        .sidebar {
            width: 300px; background-color: #7d4db3; color: white;
            display: flex; flex-direction: column; padding: 20px; border-right: 5px solid #ff33cc;
        }
        .notes-list { flex-grow: 1; overflow-y: auto; list-style: none; margin-top: 20px; }
        .note-item { 
            background: rgba(255, 255, 255, 0.1); padding: 10px; margin-bottom: 10px; 
            border-radius: 8px; cursor: pointer; font-size: 16px; border-left: 4px solid #26c4f5;
        }
        .btn-add {
            background-color: #ff33cc; color: white; font-size: 40px; border: none;
            border-radius: 50%; width: 60px; height: 60px; cursor: pointer; margin: 10px auto;
        }

        .notepad-area { flex-grow: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .notepad-container {
            width: 100%; max-width: 800px; background-color: #9b6ccf; padding: 30px;
            border-radius: 15px; box-shadow: 10px 10px 0px #ff33cc;
        }
        .notepad-textarea {
            width: 100%; height: 400px; background: transparent; border: none; outline: none;
            color: white; font-family: 'Aloja', sans-serif; font-size: 30px; line-height: 45px;
            resize: none; background-image: linear-gradient(#ff007f 1px, transparent 1px); background-size: 100% 45px;
        }
        #btn-baixar {
            margin-top: 30px; background-color: #26c4f5; color: #9b6ccf; font-size: 30px;
            padding: 10px 50px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="screen-1">
        <div class="logo-text">D.H.L</div>
        <div class="wave-separator"></div>
        <p class="system-label">SISTEMA DE: <b>DETETIVES</b></p>
        <h1 class="detectives-names">DETETIVES: Helena e Lorena</h1>
        <div class="location-info">(Mairiporã, interior de SP,<br>HARAS EL PASO)</div>
        <button id="btn-avancar">AVANÇAR</button>
    </div>

    <div id="screen-2">
        <div class="sidebar">
            <h2>ARQUIVOS</h2>
            <ul id="notesList" class="notes-list"></ul>
            <button class="btn-add" id="btn-nova-nota">+</button>
        </div>
        <div class="notepad-area">
            <div class="notepad-container">
                <textarea id="noteInput" class="notepad-textarea" placeholder="Digite as pistas..."></textarea>
            </div>
            <button id="btn-baixar">BAIXAR DOCX</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btnAvancar = document.getElementById('btn-avancar');
            const btnBaixar = document.getElementById('btn-baixar');
            const btnNovaNota = document.getElementById('btn-nova-nota');
            const screen1 = document.getElementById('screen-1');
            const screen2 = document.getElementById('screen-2');
            const noteInput = document.getElementById('noteInput');
            const notesList = document.getElementById('notesList');

            let historicoLocal = [];

            // --- LÓGICA DE ACESSO COM SENHA ---
            btnAvancar.addEventListener('click', () => {
                const senhaDigitada = prompt("DIGITE A SENHA DE ACESSO:");
                
                if (senhaDigitada === "1451") {
                    screen1.style.display = 'none';
                    screen2.style.display = 'flex';
                } else {
                    alert("SENHA INCORRETA! ACESSO NEGADO.");
                }
            });

            // --- FUNÇÃO PARA BAIXAR DOCX ---
            btnBaixar.addEventListener('click', () => {
                const texto = noteInput.value.trim();
                if (texto === "") return alert("Escreva algo antes de baixar!");

                const doc = new docx.Document({
                    sections: [{
                        children: [
                            new docx.Paragraph({
                                children: [new docx.TextRun({ text: "D.H.L - RELATÓRIO OFICIAL", bold: true, size: 32, color: "9b6ccf" })],
                                spacing: { after: 400 },
                            }),
                            new docx.Paragraph({ children: [new docx.TextRun(texto)], spacing: { before: 200 } }),
                        ],
                    }],
                });

                docx.Packer.toBlob(doc).then((blob) => {
                    saveAs(blob, "Investigacao-DHL.docx");
                    historicoLocal.push(texto);
                    atualizarLista();
                });
            });

            btnNovaNota.addEventListener('click', () => {
                noteInput.value = "";
                noteInput.focus();
            });

            function atualizarLista() {
                notesList.innerHTML = "";
                historicoLocal.forEach((nota, index) => {
                    const li = document.createElement('li');
                    li.className = 'note-item';
                    li.innerText = `Caso #${index + 1}`;
                    li.onclick = () => { noteInput.value = nota; };
                    notesList.appendChild(li);
                });
            }
        });
    </script>
</body>
</html>
